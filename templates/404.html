{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}

<div class="container py-5 text-center">
    <div class="py-5">
        <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
        <h1 class="fw-bold mt-4">404 — Page Not Found</h1>
        <p class="text-muted mb-4">The page you are looking for does not exist or has been removed.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary px-5">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
    </div>
</div>

{% endblock %}
